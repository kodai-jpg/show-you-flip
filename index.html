<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スーパー・ショウユ·フリップ</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #111; text-align: center; color: #fff; font-family: 'DotGothic16', sans-serif; touch-action: none; user-select: none; }
        h1 { font-size: 24px; color: #ffff00; text-shadow: 3px 3px #ff0000; margin: 10px 0 5px 0; }
        #canvas-container { width: 512px; height: 384px; margin: 5px auto; border: 6px solid #fff; background: #0a1128; position: relative; }
        canvas { display: block; background: #0a1128; }
        #ui { font-size: 20px; color: #55efc4; text-shadow: 2px 2px #000; }
        #sauce-container { width: 200px; height: 14px; background: #333; border: 2px solid #fff; margin: 5px auto; box-shadow: 2px 2px #000; }
        #sauce-bar { width: 100%; height: 100%; background: #ff4757; transition: width 0.1s ease; }
        #power-bar-container { width: 256px; height: 16px; background: #333; margin: 10px auto; border: 3px solid #fff; display: none; }
        #power-bar { width: 0%; height: 100%; background: #ff0000; }
        p { font-size: 13px; color: #aaa; margin: 5px; }

        /* オオサマのテキストエリア */
        #king-box { width: 480px; margin: 10px auto; background: #2c3e50; border: 3px solid #fff; padding: 10px; display: none; text-align: left; }
        #king-text { font-size: 15px; line-height: 1.5; color: #fff; }
        #king-next-btn { display: inline-block; background: #2ecc71; color: #fff; border: 2px solid #fff; padding: 5px 15px; font-family: 'DotGothic16', sans-serif; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>ｽｰﾊﾟｰ 醤油ボトルフリップ</h1>
    <div id="ui">
        <span style="color:#ffeaa7;">【ステージ <span id="stage-num">1</span> / 3】</span><br>
        残り: <span id="turns">5</span>回 | 距離: <span id="distance">0</span>m
    </div>
    
    <div style="font-size:16px; color:#ffb8b8; margin-top:5px;">ｼｮｳﾕ残量</div>
    <div id="sauce-container"><div id="sauce-bar"></div></div>

    <div id="canvas-container">
        <canvas id="gameCanvas" width="512" height="384"></canvas>
    </div>

    <div id="power-bar-container"><div id="power-bar"></div></div>
    <p id="navi-text">【操作】スペースキー or 画面クリック(タップ)長押し でチャージ</p>

    <div id="king-box">
        <div style="color: #ff7675; font-weight: bold;">👑 オオサマの おことば</div>
        <div id="king-text"></div>
        <button id="king-next-btn" onclick="nextStageAction()">ツギのステージヘ ＞</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let currentStage = 1;
let turnsLeft = 5;
let isCharging = false;
let power = 0;
const maxPower = 20;
let soySauce = 100;
let isStageEnd = false;
let distance = 0;

let bottle = {
    x: 80, y: 250,
    vx: 0, vy: 0,
    angle: 0, vAngle: 0,
    width: 24, height: 64,
    isGrounded: false
};

let cameraX = 0;
let stars = [];
for(let i=0; i<60; i++) {
    stars.push({ x: Math.random() * 5000, y: Math.random() * 200, size: Math.random() * 2 + 1 });
}

let platforms = [];
let greenZones = [];
let obstacles = [];

function generateStageData(stageNum) {
    platforms = [{ x: 0, y: 340, w: 300, h: 44 }];
    greenZones = [];
    obstacles = [];
    
    let lastX = 300;
    let gapBase = (stageNum === 2) ? 110 : 80;
    let obsChance = (stageNum === 3) ? 0.5 : 0.25;

    let seed = stageNum * 123;
    function random() {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    }

    for (let i = 0; i < 25; i++) {
        let gap = Math.floor(random() * 40) + gapBase;
        let w = Math.floor(random() * 80) + 180;
        let x = lastX + gap;
        platforms.push({ x: x, y: 340, w: w, h: 44 });

        if (i > 0 && random() < obsChance) {
            obstacles.push({ x: x + w/2 - 15, y: 310, w: 30, h: 30 });
        } else if (i > 0 && random() < 0.4) {
            greenZones.push({ x: x + 40, y: 260, w: 40, h: 80 });
        }
        lastX = x + w;
    }
}

generateStageData(1);

function gameLoop() {
    updatePhysics();
    drawGame();
    requestAnimationFrame(gameLoop);
}

function updatePhysics() {
    if (isStageEnd) return;

    if (isCharging && power < maxPower) {
        power += 0.4;
        document.getElementById('power-bar').style.width = (power / maxPower) * 100 + '%';
    }

    if (!bottle.isGrounded) {
        bottle.vy += 0.25;
        bottle.x += bottle.vx;
        bottle.y += bottle.vy;
        bottle.angle += bottle.vAngle;
    } else {
        bottle.vx *= 0.85;
        bottle.vAngle = 0; // 着地したら回転は止める
        bottle.x += bottle.vx;
    }

    let targetCamX = bottle.x - 150;
    if (targetCamX < 0) targetCamX = 0;
    cameraX += (targetCamX - cameraX) * 0.1;

    distance = Math.max(0, Math.floor((bottle.x - 80) / 8));
    document.getElementById('distance').innerText = distance;

    // 着地判定
    if (!bottle.isGrounded) {
        for (let p of platforms) {
            // ボトルの左右範囲が床の上にあるか
            if (bottle.x + bottle.width/2 > p.x && bottle.x - bottle.width/2 < p.x + p.w) {
                
                // 現在のボトルの角度を 0〜360度（ラジアン）の範囲に丸める
                let normalizedAngle = ((bottle.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                let deg = (normalizedAngle * 180) / Math.PI;

                // 角度を「上(0)」「横(90/270)」「下(180)」の4方向に割り振る
                let targetAngle = 0;
                let finalHeight = bottle.height; // 直立の時の高さベース

                if (deg >= 45 && deg < 135) {
                    targetAngle = Math.PI / 2; // 横向き（右倒れ）
                    finalHeight = bottle.width;
                } else if (deg >= 135 && deg < 225) {
                    targetAngle = Math.PI;     // 下向き（逆さま）
                    finalHeight = bottle.height;
                } else if (deg >= 225 && deg < 315) {
                    targetAngle = (Math.PI * 3) / 2; // 横向き（左倒れ）
                    finalHeight = bottle.width;
                } else {
                    targetAngle = 0;           // 上向き（真っ直ぐ）
                    finalHeight = bottle.height;
                }

                // ボトルの下端の予測Y座標
                let currentBottomY = bottle.y + finalHeight / 2;

                // 床にめり込むか、床のすれすれを通過したとき
                if (currentBottomY >= p.y && currentBottomY - bottle.vy <= p.y + 24) {
                    bottle.isGrounded = true;
                    bottle.vy = 0;
                    bottle.angle = targetAngle; // 指定の角度にピタッと補正！
                    bottle.y = p.y - finalHeight / 2; // めり込み・浮きを完璧にリセットして床の上に密着

                    // 横向きや逆さまの場合は醤油が少し漏れる
                    if (targetAngle !== 0) {
                        if (soySauce > 0) {
                            soySauce = Math.max(0, soySauce - 1.5);
                            document.getElementById('sauce-bar').style.width = soySauce + '%';
                        }
                        bottle.vx *= 0.95; // 摩擦で少し滑る
                    }
                    break;
                }
            }
        }
    }

    for (let obs of obstacles) {
        if (bottle.x + bottle.width/2 > obs.x && bottle.x - bottle.width/2 < obs.x + obs.w) {
            if (bottle.y + bottle.height/2 > obs.y && bottle.y - bottle.height/2 < obs.y + obs.h) {
                bottle.vx *= -0.6;
                bottle.vAngle = (Math.random() - 0.5) * 0.5;
                bottle.isGrounded = false;
            }
        }
    }

    for (let zone of greenZones) {
        if (bottle.x + bottle.width/2 > zone.x && bottle.x - bottle.width/2 < zone.x + zone.w) {
            if (bottle.y + bottle.height/2 > zone.y && bottle.y - bottle.height/2 < zone.y + zone.h) {
                soySauce = 100;
                document.getElementById('sauce-bar').style.width = '100%';
            }
        }
    }

    if (bottle.y > 450) {
        resetBottlePosition();
    }

    if (turnsLeft === 0 && Math.abs(bottle.vx) < 0.1 && !isCharging) {
        isStageEnd = true;
        let box = document.getElementById("king-box");
        let txt = document.getElementById("king-text");
        let btn = document.getElementById("king-next-btn");
        box.style.display = "block";

        if (currentStage === 1) {
            txt.innerText = `「フーム、記録は 【 ${distance}m 】 カ。どんな格好でも止まればヨシ！マァマァじゃネ。悪くナイド。でも、3ステージ全部クリアしたら、ウツクシイ【豪華報酬】をアゲル。がんばりなさイ。」`;
            btn.innerText = "ツギのステージ2ヘ ＞";
        } else if (currentStage === 2) {
            txt.innerText = `「ホウ、【 ${distance}m 】まで飛ばしたのネ。逆さに立ったりして、なかなか面白いフリップじゃナイド。オオサマ、ちょっと見直したヨ。さあ、次が最後のシレンだネ。」`;
            btn.innerText = "ツギのステージ3ヘ ＞";
        } else if (currentStage === 3) {
            txt.innerText = `「オオウ！すばらしい！最終記録は 【 ${distance}m 】！アクロバティックな着地、カンペキだネ。宇宙で一番の自由な醤油フリッパーだヨ。約束通り、豪華報酬【オオサマのパンツ（イチゴ柄）】をプレゼントしちゃうネ！大切に穿きなさイ。」`;
            btn.innerText = "最初からあそぶ ＞";
        }
    }
}

function drawGame() {
    ctx.fillStyle = '#0a1128';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-cameraX, 0);

    ctx.fillStyle = '#ffffff';
    for (let star of stars) {
        ctx.fillRect(star.x, star.y, star.size, star.size);
    }

    for (let zone of greenZones) {
        ctx.fillStyle = 'rgba(46, 204, 113, 0.3)';
        ctx.fillRect(zone.x, zone.y, zone.w, zone.h);
        ctx.strokeStyle = '#2ecc71';
        ctx.lineWidth = 2;
        ctx.strokeRect(zone.x, zone.y, zone.w, zone.h);
    }

    ctx.fillStyle = '#d35400';
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 4;
    for (let p of platforms) {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    }

    ctx.fillStyle = '#7f8c8d';
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    for (let obs of obstacles) {
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
    }

    ctx.save();
    ctx.translate(bottle.x, bottle.y);
    ctx.rotate(bottle.angle);

    let w = bottle.width;
    let h = bottle.height;
    
    ctx.fillStyle = '#e63946';
    ctx.fillRect(-6, -h/2, 12, 8);
    ctx.fillStyle = '#211300';
    ctx.fillRect(-w/2, -h/2 + 8, w, h - 8);
    ctx.fillStyle = '#3d260a';
    ctx.fillRect(-w/2 + 3, -h/2 + 12, w - 6, h - 20);
    ctx.fillStyle = '#d90429';
    ctx.fillRect(-w/2, -h/2 + 26, w, 16);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-3, -h/2 + 30, 6, 8);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 2;
    ctx.strokeRect(-w/2, -h/2 + 8, w, h - 8);

    ctx.restore();
    ctx.restore();
}

function startCharge() {
    if (turnsLeft <= 0 || isCharging || !bottle.isGrounded || isStageEnd) return;
    isCharging = true;
    power = 0;
    document.getElementById('power-bar-container').style.display = 'block';
}

function fire() {
    if (!isCharging) return;
    isCharging = false;
    document.getElementById('power-bar-container').style.display = 'none';
    turnsLeft--;
    document.getElementById('turns').innerText = turnsLeft;

    let sauceWeight = (soySauce === 0) ? 1.4 : 1.0;
    bottle.vx = power * 0.52 * sauceWeight;
    bottle.vy = -power * 0.82 * sauceWeight;
    bottle.vAngle = (soySauce === 0) ? 0.38 : 0.24;
    bottle.isGrounded = false;
}

function resetBottlePosition() {
    bottle.x = 80;
    bottle.y = 250;
    bottle.vx = 0;
    bottle.vy = 0;
    bottle.angle = 0;
    bottle.vAngle = 0;
    bottle.isGrounded = false;
}

window.addEventListener('keydown', (e) => { if (e.key === ' ' || e.code === 'Space') startCharge(); });
window.addEventListener('keyup', (e) => { if (e.key === ' ' || e.code === 'Space') fire(); });

canvas.addEventListener('mousedown', startCharge);
canvas.addEventListener('mouseup', fire);

canvas.addEventListener('touchstart', startCharge);
canvas.addEventListener('touchend', fire);

function nextStageAction() {
    document.getElementById("king-box").style.display = "none";
    if (currentStage === 3) { currentStage = 1; } else { currentStage++; }
    
    document.getElementById("stage-num").innerText = currentStage;
    turnsLeft = 5; soySauce = 100;
    document.getElementById('turns').innerText = turnsLeft;
    document.getElementById('sauce-bar').style.width = '100%';
    
    generateStageData(currentStage);
    resetBottlePosition();
    cameraX = 0;
    isStageEnd = false;
}

gameLoop();
</script>
</body>
</html>

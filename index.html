<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スーパー・ショウユ・フリップ</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #111; text-align: center; color: #fff; font-family: 'DotGothic16', sans-serif; touch-action: none; user-select: none; overflow: hidden; }
        h1 { font-size: 18px; color: #ffff00; text-shadow: 2px 2px #ff0000; margin: 5px 0; }
        #ui { font-size: 14px; color: #55efc4; text-shadow: 1px 1px #000; }
        #sauce-container { width: 160px; height: 10px; background: #333; border: 2px solid #fff; margin: 2px auto; box-shadow: 1px 1px #000; }
        #sauce-bar { width: 100%; height: 100%; background: #ff4757; transition: width 0.1s ease; }
        #canvas-container { width: 100%; max-width: 512px; height: auto; aspect-ratio: 512 / 384; margin: 5px auto; border: 4px solid #fff; background: #0a1128; position: relative; box-sizing: border-box; }
        canvas { width: 100%; height: 100%; display: block; background: #0a1128; }
        #power-bar-container { width: 200px; height: 10px; background: #333; margin: 5px auto; border: 2px solid #fff; display: none; }
        #power-bar { width: 0%; height: 100%; background: #ff0000; }
        p { font-size: 11px; color: #aaa; margin: 2px; }
        #king-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 400px; background: rgba(44, 62, 80, 0.95); border: 4px solid #fff; padding: 12px; display: none; text-align: left; box-shadow: 0px 0px 15px #000; z-index: 100; box-sizing: border-box; }
        #king-text { font-size: 13px; line-height: 1.4; color: #fff; margin-bottom: 10px; }
        #king-next-btn { display: block; width: 100%; background: #2ecc71; color: #fff; border: 2px solid #fff; padding: 10px 0; font-family: 'DotGothic16', sans-serif; font-size: 15px; cursor: pointer; box-shadow: 2px 2px #000; text-align: center; -webkit-appearance: none; }
        #judge-flash { position: absolute; top: 10px; right: 10px; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000; display: none; animation: flash 0.5s ease; z-index: 10; }
        @keyframes flash { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>ｽｰﾊﾟｰ 醤油ボトルフリップ</h1>
    <div id="ui">
        <span style="color:#ffeaa7;">【ｽﾃｰｼﾞ <span id="stage-num">1</span> / 3】</span>
        残り: <span id="turns">5</span>回 | 距離: <span id="distance">0</span>m
    </div>
    
    <div id="sauce-container"><div id="sauce-bar"></div></div>

    <div id="canvas-container">
        <canvas id="gameCanvas" width="512" height="384"></canvas>
        <div id="judge-flash"></div>
        <div id="king-box">
            <div style="color: #ff7675; font-weight: bold; font-size: 14px; margin-bottom: 5px;">👑 オオサマの おことば</div>
            <div id="king-text"></div>
            <div id="king-next-btn" onclick="nextStageAction()">ツギのステージヘ ＞</div>
        </div>
    </div>

    <div id="power-bar-container"><div id="power-bar"></div></div>
    <p id="navi-text">【操作】画面長押し / スペースキーでチャージ</p>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let currentStage = 1, turnsLeft = 5, isCharging = false, power = 0;
const maxPower = 20;
let soySauce = 100, isStageEnd = false, distance = 0, baseDistance = 0;

let bottle = { x: 80, y: 250, vx: 0, vy: 0, angle: 0, vAngle: 0, width: 24, height: 64, isGrounded: false };
let cameraX = 0, stars = [];
for(let i=0; i<60; i++) { stars.push({ x: Math.random() * 5000, y: Math.random() * 200, size: Math.random() * 2 + 1 }); }

let platforms = [], greenZones = [], obstacles = [];

function generateStageData(stageNum) {
    platforms = [{ x: 0, y: 340, w: 300, h: 44 }];
    greenZones = []; obstacles = [];
    let lastX = 300, gapBase = (stageNum === 2) ? 110 : 80, obsChance = (stageNum === 3) ? 0.5 : 0.25;
    let seed = stageNum * 123;
    function random() { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); }

    for (let i = 0; i < 25; i++) {
        let gap = Math.floor(random() * 40) + gapBase;
        let w = Math.floor(random() * 80) + 180;
        let x = lastX + gap;
        platforms.push({ x: x, y: 340, w: w, h: 44 });
        if (i > 0 && random() < obsChance) { obstacles.push({ x: x + w/2 - 15, y: 310, w: 30, h: 30 }); }
        else if (i > 0 && random() < 0.4) { greenZones.push({ x: x + 40, y: 260, w: 40, h: 80 }); }
        lastX = x + w;
    }
}
generateStageData(1);

function showFlash(text, color) {
    let el = document.getElementById('judge-flash');
    el.innerText = text; el.style.color = color; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 1000);
}

function gameLoop() { updatePhysics(); drawGame(); requestAnimationFrame(gameLoop); }

function updatePhysics() {
    if (isStageEnd) return;
    if (isCharging && power < maxPower) {
        power += 0.4;
        document.getElementById('power-bar').style.width = (power / maxPower) * 100 + '%';
    }
    if (!bottle.isGrounded) {
        bottle.vy += 0.25; bottle.x += bottle.vx; bottle.y += bottle.vy; bottle.angle += bottle.vAngle;
        baseDistance = Math.max(0, Math.floor((bottle.x - 80) / 8));
        distance = baseDistance;
    } else {
        bottle.vx *= 0.85; bottle.vAngle = 0; bottle.x += bottle.vx;
    }

    let targetCamX = bottle.x - 150;
    if (targetCamX < 0) targetCamX = 0;
    cameraX += (targetCamX - cameraX) * 0.1;
    document.getElementById('distance').innerText = distance;

    if (!bottle.isGrounded) {
        for (let p of platforms) {
            if (bottle.x + bottle.width/2 > p.x && bottle.x - bottle.width/2 < p.x + p.w) {
                let deg = (((bottle.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2)) * 180 / Math.PI;
                let targetAngle = 0, finalHeight = bottle.height;
                let postureBonus = 1.0; 

                // ★判定範囲を広げて確実に判定されるようにしました
                if (deg >= 135 && deg < 225) { 
                    // 逆さま（頭が下の状態）
                    targetAngle = Math.PI; finalHeight = bottle.height; 
                    postureBonus = 2.0; 
                    soySauce = 0; // 醤油ゼロ
                    showFlash("サカサマ（2倍＆醤油ゼロ！）", "#55efc4");
                } else if ((deg >= 45 && deg < 135) || (deg >= 225 && deg < 315)) { 
                    // 横向き
                    targetAngle = (deg >= 45 && deg < 135) ? Math.PI / 2 : (Math.PI * 3) / 2;
                    finalHeight = bottle.width; 
                    postureBonus = 0.5; 
                    soySauce = Math.max(0, soySauce - 50); // 醤油半分
                    showFlash("ヨコムキ（0.5倍＆醤油半分）", "#ff7675");
                } else { 
                    // 直立成功（通常）
                    targetAngle = 0; finalHeight = bottle.height; 
                    postureBonus = 1.0; 
                    // 醤油は減らさない（そのまま維持）
                    showFlash("直立成功（通常）", "#ffeaa7");
                }
                
                let currentBottomY = bottle.y + finalHeight / 2;
                if (currentBottomY >= p.y && currentBottomY - bottle.vy <= p.y + 24) {
                    bottle.isGrounded = true; bottle.vy = 0; bottle.angle = targetAngle; bottle.y = p.y - finalHeight / 2;
                    
                    distance = Math.floor(baseDistance * postureBonus);
                    document.getElementById('sauce-bar').style.width = soySauce + '%'; 
                    break;
                }
            }
        }
        if (bottle.y > 360) { resetBottlePosition(); }
    }

    for (let obs of obstacles) {
        if (bottle.x + bottle.width/2 > obs.x && bottle.x - bottle.width/2 < obs.x + obs.w && bottle.y + bottle.height/2 > obs.y && bottle.y - bottle.height/2 < obs.y + obs.h) {
            bottle.vx *= -0.6; bottle.vAngle = (Math.random() - 0.5) * 0.5; bottle.isGrounded = false;
        }
    }
    for (let zone of greenZones) {
        if (bottle.x + bottle.width/2 > zone.x && bottle.x - bottle.width/2 < zone.x + zone.w && bottle.y + bottle.height/2 > zone.y && bottle.y - bottle.height/2 < zone.y + zone.h) {
            soySauce = 100; document.getElementById('sauce-bar').style.width = '100%';
        }
    }

    if (turnsLeft === 0 && Math.abs(bottle.vx) < 0.1 && !isCharging) {
        isStageEnd = true;
        document.getElementById("king-box").style.display = "block";
        let txt = document.getElementById("king-text"), btn = document.getElementById("king-next-btn");
        if (currentStage === 1) { txt.innerText = `「フーム、最終スコアは 【 ${distance}m 】 ネ。逆さ着地を狙って一発逆転を狙いなさイ。」`; btn.innerText = "ツギのステージ2ヘ ＞"; }
        else if (currentStage === 2) { txt.innerText = `「ホウ、【 ${distance}m 】カ。横向きで醤油が漏れるのはもったいナイド。さあ、次が最後のシレンだネ。」`; btn.innerText = "ツギのステージ3ヘ ＞"; }
        else if (currentStage === 3) { txt.innerText = `「オオウ！最終結果は 【 ${distance}m 】！完璧にボトルをコントロールしたネ！【オオサマのパンツ】を授与するヨ！」`; btn.innerText = "最初からあそぶ ＞"; }
    }
}

function drawGame() {
    ctx.fillStyle = '#0a1128'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(-cameraX, 0);
    ctx.fillStyle = '#ffffff'; for (let star of stars) { ctx.fillRect(star.x, star.y, star.size, star.size); }
    for (let zone of greenZones) { ctx.fillStyle = 'rgba(46, 204, 113, 0.3)'; ctx.fillRect(zone.x, zone.y, zone.w, zone.h); ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2; ctx.strokeRect(zone.x, zone.y, zone.w, zone.h); }
    ctx.fillStyle = '#d35400'; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4; for (let p of platforms) { ctx.fillRect(p.x, p.y, p.w, p.h); ctx.strokeRect(p.x, p.y, p.w, p.h); }
    ctx.fillStyle = '#7f8c8d'; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; for (let obs of obstacles) { ctx.fillRect(obs.x, obs.y, obs.w, obs.h); ctx.strokeRect(obs.x, obs.y, obs.w, obs.h); }
    
    ctx.save(); ctx.translate(bottle.x, bottle.y); ctx.rotate(bottle.angle);
    let w = bottle.width, h = bottle.height;
    ctx.fillStyle = '#e63946'; ctx.fillRect(-6, -h/2, 12, 8);
    ctx.fillStyle = '#211300'; ctx.fillRect(-w/2, -h/2 + 8, w, h - 8);
    ctx.fillStyle = '#3d260a'; ctx.fillRect(-w/2 + 3, -h/2 + 12, w - 6, h - 20);
    ctx.fillStyle = '#d90429'; ctx.fillRect(-w/2, -h/2 + 26, w, 16);
    ctx.fillStyle = '#ffffff'; ctx.fillRect(-3, -h/2 + 30, 6, 8);
    ctx.strokeStyle = '#000000'; ctx.lineWidth = 2; ctx.strokeRect(-w/2, -h/2 + 8, w, h - 8);
    ctx.restore(); ctx.restore();
}

function startCharge(e) { if (e) e.preventDefault(); if (turnsLeft <= 0 || isCharging || !bottle.isGrounded || isStageEnd) return; isCharging = true; power = 0; document.getElementById('power-bar-container').style.display = 'block'; }
function fire(e) { 
    if (e) e.preventDefault(); 
    if (!isCharging) return; 
    isCharging = false; 
    document.getElementById('power-bar-container').style.display = 'none'; 
    turnsLeft--; 
    document.getElementById('turns').innerText = turnsLeft; 

    let weightBoost = 1.7 - (soySauce / 100) * 1.15; 

    bottle.vx = power * 0.48 * weightBoost; 
    bottle.vy = -power * 0.78 * weightBoost; 
    bottle.vAngle = (soySauce === 0) ? 0.40 : 0.22; 
    bottle.isGrounded = false; 
}
function resetBottlePosition() { bottle.x = 80; bottle.y = 250; bottle.vx = 0; vy = 0; bottle.angle = 0; bottle.vAngle = 0; bottle.isGrounded = false; }

window.addEventListener('keydown', (e) => { if (e.key === ' ' || e.code === 'Space') startCharge(); });
window.addEventListener('keyup', (e) => { if (e.key === ' ' || e.code === 'Space') fire(); });
canvas.addEventListener('mousedown', startCharge); canvas.addEventListener('mouseup', fire);
canvas.addEventListener('touchstart', startCharge, {passive: false}); canvas.addEventListener('touchend', fire, {passive: false});

function nextStageAction() {
    document.getElementById("king-box").style.display = "none"; currentStage = (currentStage === 3) ? 1 : currentStage + 1;
    document.getElementById("stage-num").innerText = currentStage; turnsLeft = 5; soySauce = 100;
    document.getElementById('turns').innerText = turnsLeft; document.getElementById('sauce-bar').style.width = '100%';
    generateStageData(currentStage); resetBottlePosition(); cameraX = 0; isStageEnd = false;
}
gameLoop();
</script>
</body>
</html>
